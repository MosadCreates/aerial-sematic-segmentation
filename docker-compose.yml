# =========================================================================== #
# docker-compose.yml — Local inference server
# =========================================================================== #
# Usage:
#   docker-compose up -d                    # Start server
#   docker-compose logs -f                  # Follow logs
#   curl http://localhost:8000/health       # Health check
#   docker-compose down                     # Stop server
#
# Mount a checkpoint directory to use a trained model:
#   docker-compose run -v /path/to/checkpoints:/app/checkpoints ...
# =========================================================================== #

version: "3.9"

services:
  segmentation-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: aerial-segmentation:latest
    container_name: aerial-segmentation
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CHECKPOINT_PATH=/app/checkpoints/best_model.pth
      - CONFIG_PATH=/app/configs/config.yaml
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      # Mount checkpoint directory (create ./checkpoints with your .pth files)
      - ./checkpoints:/app/checkpoints:ro
      # Mount config directory (if you want to override configs)
      - ./configs:/app/configs:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; resp = urllib.request.urlopen('http://localhost:8000/health'); assert resp.status == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Optional: CPU-only fallback
