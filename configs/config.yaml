# =========================================================================== #
# Base Configuration — Semantic Segmentation on Aerial Imagery
# =========================================================================== #
# All paths are relative to the project root unless absolute.
# Every training script loads this via src/utils/config.py.
# ===========================================================================

# ── Random Seed ─────────────────────────────────────────────────────────────
seed: 42

# ── Paths ───────────────────────────────────────────────────────────────────
data_root: ./data
ckpt_dir: ./checkpoints
results_dir: ./results
log_dir: ./logs

# ── Dataset ─────────────────────────────────────────────────────────────────
dataset:
  name: loveda
  repo_id: tacoperis/loveda
  num_classes: 7
  class_names:
    - Background
    - Building
    - Road
    - Water
    - Barren
    - Forest
    - Agriculture
  image_size: 1024  # LoveDA native resolution
  crop_size: 512    # Random crop during training
  val_size: 1024    # Full resolution for validation

# ── Augmentation ────────────────────────────────────────────────────────────
augmentation:
  train:
    crop_size: [512, 512]
    horizontal_flip_prob: 0.5
    vertical_flip_prob: 0.5
    rotate90_prob: 0.5
    shift_scale_rotate:
      shift_limit: 0.0625
      scale_limit: 0.1
      rotate_limit: 30
      prob: 0.5
    elastic_transform:
      alpha: 1
      sigma: 50
      alpha_affine: 50
      prob: 0.2
    brightness_contrast:
      brightness_limit: 0.2
      contrast_limit: 0.2
      prob: 0.5
    hue_saturation_value:
      hue_shift_limit: 10
      sat_shift_limit: 20
      val_shift_limit: 10
      prob: 0.5
    gaussian_blur:
      blur_limit: [3, 7]
      prob: 0.2
    gauss_noise:
      var_limit: [10.0, 50.0]
      prob: 0.2
    clahe:
      clip_limit: 2.0
      tile_grid_size: [8, 8]
      prob: 0.3
    normalize:
      mean: [0.485, 0.456, 0.406]  # ImageNet mean
      std: [0.229, 0.224, 0.225]   # ImageNet std
  val:
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# ── CutMix ──────────────────────────────────────────────────────────────────
cutmix:
  enabled: true
  prob: 0.5           # Probability of applying CutMix to a batch
  alpha: 1.0          # Beta distribution parameter for box size

# ── Model ───────────────────────────────────────────────────────────────────
model:
  # Encoder
  encoder_name: efficientnet-b4
  encoder_weights: imagenet
  encoder_freeze_epochs: 5   # Number of epochs to freeze encoder
  encoder_lr_multiplier: 0.1 # Lower LR for pretrained encoder

  # Decoder
  decoder_channels: [256, 128, 64, 32, 16]
  use_scse: true      # Spatial and Channel Squeeze-and-Excitation blocks

  # Deep supervision
  deep_supervision: true
  deep_supervision_weights: [1.0, 0.5, 0.25]  # Main, aux1, aux2
  aux_weight_anneal_epochs: 10  # Anneal aux weights to 0 over this many epochs

  # Output
  num_classes: 7

# ── Loss ────────────────────────────────────────────────────────────────────
loss:
  alpha: 1.0    # Cross-entropy weight
  beta: 1.0     # Dice loss weight
  gamma: 0.5    # Boundary-aware loss weight
  label_smoothing: 0.1
  dice_smooth: 1e-6
  boundary:
    enabled: true
    kernel_size: 3
    boundary_width: 3  # K: pixels within K of a boundary get higher weight
    boundary_weight: 2.0  # Multiplier for boundary pixels

# ── Optimizer ───────────────────────────────────────────────────────────────
optimizer:
  name: adamw
  lr: 1e-3          # Base learning rate (decoder)
  encoder_lr: 1e-4   # Encoder learning rate (lr * multiplier)
  weight_decay: 1e-4
  beta1: 0.9
  beta2: 0.999

# ── Scheduler ───────────────────────────────────────────────────────────────
scheduler:
  name: cosine_warm_restarts
  t_0: 10     # First restart epoch
  t_mult: 2   # Double period after each restart
  eta_min: 1e-6
  warmup_epochs: 5
  warmup_lr: 1e-6

# ── Training ────────────────────────────────────────────────────────────────
training:
  epochs: 60
  batch_size: 8
  num_workers: 4
  val_frequency: 1       # Validate every N epochs
  log_frequency: 50      # Log every N steps
  visualize_frequency: 5 # Log segmentation overlays every N epochs

  # Mixed precision
  mixed_precision: true

  # Gradient
  gradient_clip_norm: 1.0
  gradient_accumulation_steps: 1

  # Checkpointing
  save_top_k: 3
  resume: null  # Path to checkpoint to resume from

# ── Sliding Window Inference ────────────────────────────────────────────────
sliding_window:
  patch_size: 512
  stride: 256       # 50% overlap
  gaussian_weight: true  # Gaussian weighting at patch boundaries

# ── Weights & Biases ────────────────────────────────────────────────────────
wandb:
  project: aerial-semantic-segmentation
  entity: null
  run_name: null
  mode: online  # online, offline, or disabled
  log_images: true
